<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth 2048 — Nature's Growth</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
  <canvas id="bg-canvas"></canvas>
  <div id="particles-canvas"></div>
  <header>
    <h1>🌍 Earth 2048</h1>
    <div class="scores">
      <div class="score-box">
        <span class="label">SCORE</span>
        <span id="score">0</span>
      </div>
      <div class="score-box">
        <span class="label">BEST</span>
        <span id="best-score">0</span>
      </div>
    </div>
    <div class="controls">
      <button id="new-game-btn">🌱 New Growth</button>
      <div class="season-indicator">
        <span id="season-icon">🌸</span>
        <span id="season-name">Spring</span>
      </div>
    </div>
  </header>
  
  <div id="board-wrapper">
    <div id="board">
      <!-- 4x4 grid generated by JS -->
    </div>
    <div id="roots-svg-container">
      <svg id="roots-svg"></svg>
    </div>
  </div>
  
  <div id="game-over-overlay" class="hidden">
    <div class="overlay-content">
      <h2>🍂 Winter Has Come</h2>
      <p>Your ecosystem reached <span id="final-score">0</span></p>
      <button id="restart-btn">🌱 Plant Again</button>
    </div>
  </div>
  
  <div id="win-overlay" class="hidden">
    <div class="overlay-content">
      <h2>🌳 Full Ecosystem!</h2>
      <p>You reached 2048! Keep growing?</p>
      <button id="continue-btn">🌿 Continue Growing</button>
      <button id="restart-btn-win">🌱 New Seed</button>
    </div>
  </div>
  
  <div class="instructions">
    <p>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or swipe to merge tiles</p>
    <p class="legend">Seed → Sprout → Plant → Shrub → Tree → Grove → Forest → Ecosystem → Gaia</p>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
